<!DOCTYPE html>
<html>
<head>
    <title>BiPay System Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .loading { background-color: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎯 BiPay System Status</h1>
    
    <h2>Backend Status</h2>
    <div id="backend-status" class="status loading">Testing backend connection...</div>
    <button onclick="testBackend()">Test Backend</button>
    
    <h2>Frontend Status</h2>
    <div id="frontend-status" class="status success">Frontend loaded successfully ✅</div>
    
    <h2>API Tests</h2>
    <button onclick="testAPI()">Test API Endpoints</button>
    <div id="api-results"></div>
    
    <h2>Quick Links</h2>
    <p>
        <a href="http://localhost:3000" target="_blank">React Frontend</a> | 
        <a href="http://localhost:8000/docs" target="_blank">API Documentation</a>
    </p>

    <script>
        async function testBackend() {
            const statusDiv = document.getElementById('backend-status');
            statusDiv.className = 'status loading';
            statusDiv.textContent = 'Testing backend...';
            
            try {
                const response = await fetch('http://localhost:8000/health');
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.className = 'status success';
                    statusDiv.textContent = `Backend running ✅ - ${JSON.stringify(data)}`;
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `Backend error: ${response.status} ${response.statusText}`;
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `Backend connection failed: ${error.message}`;
            }
        }
        
        async function testAPI() {
            const resultsDiv = document.getElementById('api-results');
            resultsDiv.innerHTML = '<div class="status loading">Testing API endpoints...</div>';
            
            const tests = [
                { name: 'Health Check', url: 'http://localhost:8000/health' },
                { name: 'System Stats', url: 'http://localhost:8000/api/v1/system/stats' },
                { name: 'Root Endpoint', url: 'http://localhost:8000/' }
            ];
            
            let results = '';
            for (const test of tests) {
                try {
                    const response = await fetch(test.url);
                    const status = response.ok ? 'success' : 'error';
                    results += `<div class="status ${status}">${test.name}: ${response.status} ${response.statusText}</div>`;
                } catch (error) {
                    results += `<div class="status error">${test.name}: Failed - ${error.message}</div>`;
                }
            }
            resultsDiv.innerHTML = results;
        }
        
        // Auto-test backend on load
        window.onload = () => {
            testBackend();
        };
    </script>
</body>
</html>
